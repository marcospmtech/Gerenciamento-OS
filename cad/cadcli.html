<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="pt-br">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../data/style/style.css">
    <link rel="stylesheet" href="../data/style/cadcli.css">
    <link rel="shortcut icon" href="../data/logo/flaticon.ico" type="image/x-icon">

    <title>Gerenciamento OS</title>

    <!--FONTS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="http
    s://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <!--FONTS-->
</head>
<body>
    <header>
        <div class="header-title">
            <a href="../index.html"><img src="../data/img/logo/flaticon.ico" alt="Gerenciamento OS"></a>
            <h1>Gerenciamento OS</h1>
        </div>

        <div class="header-extra">
            <a href="caduse.html"><img src="../data/img/icon/user.png" alt="Login/Register"></a>
        </div>
    </header>

    <main>
        <div class="card-form-grid">
            <div class="card-form">
                <p class="title-form">CADASTRO DE CLIENTE</p>
                <form action="#" method="post">
                    <div class="input-group">
                        <input type="text" id="nome" name="nome" required>
                        <label for="nome">Nome</label>
                    </div>

                    <div class="input-group">
                        <input type="email" id="email" name="email" required>
                        <label for="email">E-mail</label>
                    </div>

                    <div class="input-group">
                        <input type="text" id="telefone" name="telefone" required>
                        <label for="telefone">Telefone</label>
                    </div>

                    <div class="input-group">
                        <input type="password" id="senha" name="senha" required>
                        <label for="senha">Senha</label>
                    </div>

                    <button class="button">
                        Cadastre-se
                        <svg fill="currentColor" viewBox="0 0 24 24" class="icon">
                            <path
                            clip-rule="evenodd"
                            d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zm4.28 10.28a.75.75 0 000-1.06l-3-3a.75.75 0 10-1.06 1.06l1.72 1.72H8.25a.75.75 0 000 1.5h5.69l-1.72 1.72a.75.75 0 101.06 1.06l3-3z"
                            fill-rule="evenodd"
                            ></path>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
